<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>География - Архив нефтегаза</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Century Gothic', CenturyGothic, sans-serif;
            background-color: #1c0303;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            background-color: #1c0303;
            background-image: url('photo_2026-07-06_22-32-18.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            padding: 40px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .page > * {
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 30px;
            display: inline-block;
        }

        .header h2 {
            font-size: 18px;
            font-weight: normal;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 8px 25px;
            border-radius: 30px;
            display: inline-block;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        .container {
            display: flex;
            gap: 30px;
            flex: 1;
            align-items: flex-start;
        }

        .menu {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu button {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            padding-left: 25px;
        }

        .menu button:hover {
            background-color: #d2b48c;
            color: #1c0303;
            border-color: #000000;
            transform: scale(1.03);
        }

        .content {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            min-height: 300px;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .content h3 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #d2b48c;
        }

        .content p {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e8f0;
        }

        .content .highlight {
            color: #d2b48c;
            font-weight: bold;
        }

        .back-button {
            margin-top: 30px;
            text-align: center;
        }

        .back-button a {
            display: inline-block;
            padding: 10px 30px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background-color: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-button a:hover {
            background-color: #d2b48c;
            color: #1c0303;
            border-color: #000000;
            transform: scale(1.05);
        }

        .page {
            animation: fadeInScale 0.8s ease;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95);
                background-color: transparent;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                background-color: #1a3a5c;
            }
        }
    </style>

</head>
<body>

    <div class="page">

        <div class="header">
            <h1>ГЕОГРАФИЯ</h1>
            <h2>Нефтегазовые регионы России: от истоков до современных рубежей</h2>
        </div>

        <div class="container">

            <div class="menu">
                <button onclick="showRegion('origins')">ИСТОКИ</button>
                <button onclick="showRegion('second_baku')">"ВТОРОЕ БАКУ"</button>
                <button onclick="showRegion('siberian_expansion')">СИБИРСКАЯ ЭКСПАНСИЯ</button>
                <button onclick="showRegion('northern_frontiers')">СЕВЕРНЫЕ РУБЕЖИ</button>
                <button onclick="showRegion('shelf')">ШЕЛЬФ</button>
            </div>

            <div class="content" id="infoBlock">
                <h3>НЕФТЕГАЗОВАЯ КАРТА РОССИИ</h3>
                <p>Выберите регион из меню слева, чтобы узнать подробности.</p>
                <p style="color: #8899aa; font-style: italic; margin-top: 15px;">Здесь будет информация по выбранному региону</p>
            </div>

        </div>

        <div class="back-button">
            <a href="practika.html">← НАЗАД НА ГЛАВНУЮ</a>
        </div>

    </div>

    <script>
        function showRegion(region) {
            var block = document.getElementById('infoBlock');

            if (region === 'origins') {
                block.innerHTML = `
                    <h3>ИСТОКИ</h3>
                    <p><span class="highlight">Кавказский регион</span></p>
                    <p>Первые нефтяные промыслы России зародились на Кавказе.</p>
                    <p><span class="highlight">Ключевые центры:</span></p>
                    <p>• <strong>Баку</strong> — крупнейший нефтяной центр XIX века</p>
                    <p>• <strong>Грозный</strong> — центр нефтедобычи на Северном Кавказе</p>
                    <p>• <strong>Майкоп</strong> — одно из первых месторождений</p>
                    <p>К концу XIX века Кавказ давал более 95% всей российской нефти.</p>
                `;
            }
            else if (region === 'second_baku') {
                block.innerHTML = `
                    <h3>"ВТОРОЕ БАКУ"</h3>
                    <p><span class="highlight">Урал-Поволжский регион</span></p>
                    <p>В 1930-1940-е годы открыты крупные месторождения между Волгой и Уралом.</p>
                    <p><span class="highlight">Ключевые месторождения:</span></p>
                    <p>• <strong>Татарстан</strong> — Ромашкинское месторождение</p>
                    <p>• <strong>Башкортостан</strong> — Ишимбайское месторождение</p>
                    <p>• <strong>Самарская область</strong> — Мухановское месторождение</p>
                    <p>Регион стал основой нефтяной безопасности СССР в годы войны.</p>
                `;
            }
            else if (region === 'siberian_expansion') {
                block.innerHTML = `
                    <h3>СИБИРСКАЯ ЭКСПАНСИЯ</h3>
                    <p><span class="highlight">Западная Сибирь</span></p>
                    <p>В 1960-е годы началось освоение уникальных месторождений Западной Сибири.</p>
                    <p><span class="highlight">Ключевые месторождения:</span></p>
                    <p>• <strong>Самотлор</strong> — крупнейшее месторождение России</p>
                    <p>• <strong>Сургут</strong> — центр нефтедобычи</p>
                    <p>• <strong>Нижневартовск</strong> — ключевой город-нефтяник</p>
                    <p>• <strong>Усть-Балык</strong> — одно из первых месторождений</p>
                    <p><span class="highlight">Результат:</span> Западная Сибирь стала главным нефтяным регионом страны.</p>
                `;
            }
            else if (region === 'northern_frontiers') {
                block.innerHTML = `
                    <h3>СЕВЕРНЫЕ РУБЕЖИ</h3>
                    <p><span class="highlight">Тимано-Печорский регион</span></p>
                    <p>Освоение северных территорий началось в 1970-1980-е годы.</p>
                    <p><span class="highlight">Ключевые месторождения:</span></p>
                    <p>• <strong>Усинское</strong> — крупнейшее в регионе</p>
                    <p>• <strong>Возейское</strong> — одно из первых северных месторождений</p>
                    <p>• <strong>Харьягинское</strong> — активно разрабатывается</p>
                    <p><span class="highlight">Особенность:</span> добыча в условиях вечной мерзлоты и сурового климата.</p>
                `;
            }
            else if (region === 'shelf') {
                block.innerHTML = `
                    <h3>ШЕЛЬФ</h3>
                    <p><span class="highlight">Арктический и дальневосточный шельф</span></p>
                    <p>Новый этап освоения — морские месторождения на шельфе.</p>
                    <p><span class="highlight">Ключевые проекты:</span></p>
                    <p>• <strong>Сахалин-1, Сахалин-2</strong> — крупнейшие проекты на Дальнем Востоке</p>
                    <p>• <strong>Штокмановское месторождение</strong> — уникальное газовое месторождение в Баренцевом море</p>
                    <p>• <strong>Приразломное</strong> — первое арктическое месторождение</p>
                    <p><span class="highlight">Перспективы:</span> освоение Арктики — стратегическое направление развития.</p>
                `;
            }
        }
    </script>

</body>
</html>
