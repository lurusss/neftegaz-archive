<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личности - Архив нефтегаза</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Century Gothic', CenturyGothic, sans-serif;
            background-color: #1c0303;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            background-color: #1c0303;
            background-image: url('photo_2026-07-06_22-32-18.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            padding: 40px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .page > * {
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 30px;
            display: inline-block;
        }

        .header h2 {
            font-size: 18px;
            font-weight: normal;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 8px 25px;
            border-radius: 30px;
            display: inline-block;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        .container {
            display: flex;
            gap: 30px;
            flex: 1;
            align-items: flex-start;
        }

        .menu {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu button {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            padding-left: 25px;
        }

        .menu button:hover {
            background-color: #d2b48c;
            color: #1c0303;
            border-color: #000000;
            transform: scale(1.03);
        }

        .content {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            min-height: 300px;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .content h3 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #d2b48c;
        }

        .content p {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e8f0;
        }

        .content .highlight {
            color: #d2b48c;
            font-weight: bold;
        }

        .content .person-name {
            font-size: 20px;
            color: #d2b48c;
            font-weight: bold;
            margin-top: 10px;
        }

        .back-button {
            margin-top: 30px;
            text-align: center;
        }

        .back-button a {
            display: inline-block;
            padding: 10px 30px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background-color: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-button a:hover {
            background-color: #d2b48c;
            color: #1c0303;
            border-color: #000000;
            transform: scale(1.05);
        }

        .page {
            animation: fadeInScale 0.8s ease;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95);
                background-color: transparent;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                background-color: #1a3a5c;
            }
        }
    </style>

</head>
<body>

    <div class="page">

        <div class="header">
            <h1>ЛИЧНОСТИ</h1>
            <h2>Выдающиеся деятели нефтегазовой отрасли России</h2>
        </div>

        <div class="container">

            <div class="menu">
                <button onclick="showPerson('formation')">ЭПОХА СТАНОВЛЕНИЯ</button>
                <button onclick="showPerson('industrial')">ПЕРИОД ИНДУСТРИАЛИЗАЦИИ</button>
                <button onclick="showPerson('discoveries')">ЭРА ВЕЛИКИХ ОТКРЫТИЙ</button>
                <button onclick="showPerson('modern')">СОВРЕМЕННЫЙ ЭТАП</button>
            </div>

            <div class="content" id="infoBlock">
                <h3>ЛЮДИ, СОЗДАВШИЕ НЕФТЕГАЗОВУЮ ОТРАСЛЬ</h3>
                <p>Выберите эпоху из меню слева, чтобы узнать о выдающихся личностях.</p>
                <p style="color: #8899aa; font-style: italic; margin-top: 15px;">Здесь будет информация по выбранной эпохе</p>
            </div>

        </div>

        <div class="back-button">
            <a href="practika.html">← НАЗАД НА ГЛАВНУЮ</a>
        </div>

    </div>

    <script>
        function showPerson(era) {
            var block = document.getElementById('infoBlock');

            if (era === 'formation') {
                block.innerHTML = `
                    <h3>ЭПОХА СТАНОВЛЕНИЯ</h3>
                    <p><span class="highlight">XIX — начало XX века</span></p>
                    <p>Пионеры нефтяного дела, заложившие основы отрасли.</p>
                    
                    <div class="person-name">Владимир Семёнов</div>
                    <p>Один из первых исследователей нефтяных месторождений на Кавказе. Внёс вклад в развитие нефтяного дела в Баку и Грозном.</p>
                    
                    <div class="person-name">Александр Вернер</div>
                    <p>Геолог и предприниматель, активно развивавший нефтяные промыслы на Северном Кавказе в конце XIX века.</p>
                    
                    <div class="person-name">Семён Варун-Секрет</div>
                    <p>Инженер-механик, создатель первого в России нефтяного завода в Грозном. Внёс вклад в развитие нефтепереработки.</p>
                    
                    <p style="margin-top: 10px;"><span class="highlight">Вклад:</span> создание первых заводов, развитие торговли, строительство нефтепроводов.</p>
                `;
            }
            else if (era === 'industrial') {
                block.innerHTML = `
                    <h3>ПЕРИОД ИНДУСТРИАЛИЗАЦИИ</h3>
                    <p><span class="highlight">1920 — 1950-е годы</span></p>
                    <p>Инженеры и организаторы советской нефтяной промышленности.</p>
                    
                    <div class="person-name">Иван Губкин</div>
                    <p>Основоположник нефтяной геологии в СССР. Разработал теорию происхождения нефти, открыл месторождения в Поволжье и на Урале.</p>
                    
                    <div class="person-name">Николай Байбаков</div>
                    <p>Выдающийся организатор нефтяной промышленности. В годы войны руководил обеспечением фронта нефтепродуктами.</p>
                    
                    <div class="person-name">Андрей Трофимук</div>
                    <p>Геолог, открывший Волго-Уральскую нефтегазоносную провинцию («Второе Баку»). Создатель новых методов поиска месторождений.</p>
                    
                    <p style="margin-top: 10px;"><span class="highlight">Вклад:</span> создание мощной нефтяной базы в Поволжье и на Урале, обеспечение нефтью в годы войны.</p>
                `;
            }
            else if (era === 'discoveries') {
                block.innerHTML = `
                    <h3>ЭРА ВЕЛИКИХ ОТКРЫТИЙ</h3>
                    <p><span class="highlight">1960 — 1990-е годы</span></p>
                    <p>Первооткрыватели сибирских и северных месторождений.</p>
                    
                    <div class="person-name">Фарман Салманов</div>
                    <p>Главный первооткрыватель Западной Сибири. Вопреки сомнениям геологов, доказал наличие огромных запасов нефти в Сибири. Открыл Самотлорское месторождение.</p>
                    
                    <div class="person-name">Виктор Муравленко</div>
                    <p>Генеральный директор объединения «Главтюменьнефтегаз». Руководил созданием нефтяного комплекса Западной Сибири.</p>
                    
                    <div class="person-name">Валентин Шашин</div>
                    <p>Министр нефтяной промышленности СССР. Внёс вклад в развитие нефтяной отрасли, строительство трубопроводов и освоение Сибири.</p>
                    
                    <p style="margin-top: 10px;"><span class="highlight">Вклад:</span> открытие Западной Сибири как главной нефтяной базы страны, создание крупнейших месторождений.</p>
                `;
            }
            else if (era === 'modern') {
                block.innerHTML = `
                    <h3>СОВРЕМЕННЫЙ ЭТАП</h3>
                    <p><span class="highlight">2000-е — настоящее время</span></p>
                    <p>Создатели современных нефтегазовых корпораций и технологий.</p>
                    
                    <div class="person-name">Вагит Алекперов</div>
                    <p>Основатель и президент компании ЛУКОЙЛ — одной из крупнейших частных нефтяных компаний мира. Внёс вклад в развитие отрасли в постсоветский период.</p>
                    
                    <div class="person-name">Алексей Миллер</div>
                    <p>Председатель правления «Газпрома». Руководит развитием газовой отрасли, строительством новых газопроводов, включая «Северный поток».</p>
                    
                    <div class="person-name">Игорь Сечин</div>
                    <p>Глава компании «Роснефть». Руководит крупнейшей государственной нефтяной компанией, развивает проекты в Арктике и на шельфе.</p>
                    
                    <div class="person-name">Александр Новак</div>
                    <p>Министр энергетики РФ. Внёс вклад в развитие энергетической политики, международное сотрудничество в области энергоресурсов.</p>
                    
                    <p style="margin-top: 10px;"><span class="highlight">Вклад:</span> создание современных компаний, освоение Арктики и шельфа, внедрение новых технологий.</p>
                `;
            }
        }
    </script>

</body>
</html>
